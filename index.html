<!DOCTYPE html>

<head>

<title>Assets — Assinatura Ocyan</title>
<style>

  <div class="grid">

    <div class="item"><img src="icon-mail-blue.png" width="24" alt=""><code>icon-mail-blue.png</code></div>

    <div class="item"><img src="icon-voip-gray.png" width="24" alt=""><code>icon-voip-gray.png</code></div>
    <div class="item"><img src="icon-instagram.png" width="24" alt=""><code>icon-instagram.png</code></div>
    <div class="item"><img src="icon-facebook.png" width="24" alt=""><code>icon-facebook.png</code></div>
    <div class="item"><img src="icon-linkedin.png" width="24" alt=""><code>icon-linkedin.png</code></div>

  </div>
